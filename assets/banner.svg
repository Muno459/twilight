<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <defs>
    <!-- Deep space to twilight gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="20%" stop-color="#0c0e24"/>
      <stop offset="40%" stop-color="#1b1545"/>
      <stop offset="58%" stop-color="#3d1d6e"/>
      <stop offset="72%" stop-color="#8b3058"/>
      <stop offset="82%" stop-color="#c4553f"/>
      <stop offset="90%" stop-color="#de8a3a"/>
      <stop offset="96%" stop-color="#edb555"/>
      <stop offset="100%" stop-color="#f5d07a"/>
    </linearGradient>

    <!-- Sun glow below horizon -->
    <radialGradient id="sun-glow" cx="28%" cy="88%" r="35%">
      <stop offset="0%" stop-color="#f5d07a" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#de8a3a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1b1545" stop-opacity="0"/>
    </radialGradient>

    <!-- Earth body -->
    <radialGradient id="earth-fill" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#08080c"/>
    </radialGradient>

    <!-- Atmospheric shell glow -->
    <radialGradient id="atm-glow" cx="50%" cy="100%" r="55%" fx="50%" fy="100%">
      <stop offset="85%" stop-color="#f5d07a" stop-opacity="0"/>
      <stop offset="93%" stop-color="#de8a3a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f5d07a" stop-opacity="0.12"/>
    </radialGradient>

    <!-- Scattered light ray color -->
    <linearGradient id="ray-blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6688cc" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6688cc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6688cc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cc6644" stop-opacity="0"/>
      <stop offset="40%" stop-color="#cc6644" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#cc6644" stop-opacity="0"/>
    </linearGradient>

    <filter id="soft">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="star-soft">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="520" fill="url(#sky)"/>
  <rect width="1200" height="520" fill="url(#sun-glow)"/>

  <!-- Stars -->
  <g fill="#fff" filter="url(#star-soft)">
    <circle cx="78" cy="22" r="1.1"/><circle cx="195" cy="55" r="0.7"/>
    <circle cx="310" cy="18" r="1.3"/><circle cx="425" cy="42" r="0.6"/>
    <circle cx="540" cy="12" r="0.9"/><circle cx="612" cy="65" r="0.8"/>
    <circle cx="734" cy="28" r="1.0"/><circle cx="830" cy="50" r="0.7"/>
    <circle cx="948" cy="20" r="1.2"/><circle cx="1050" cy="58" r="0.6"/>
    <circle cx="1130" cy="15" r="0.8"/><circle cx="145" cy="90" r="0.5"/>
    <circle cx="480" cy="80" r="0.6"/><circle cx="870" cy="78" r="0.5"/>
    <circle cx="1090" cy="88" r="0.7"/><circle cx="55" cy="68" r="0.6"/>
    <circle cx="690" cy="38" r="0.5"/><circle cx="1005" cy="75" r="0.4"/>
    <circle cx="250" cy="105" r="0.4"/><circle cx="770" cy="95" r="0.5"/>
  </g>

  <!-- Earth (large arc at bottom) -->
  <ellipse cx="600" cy="820" rx="750" ry="400" fill="url(#earth-fill)" stroke="#1a1a2e" stroke-width="1"/>

  <!-- Atmospheric shells (concentric arcs above Earth surface) -->
  <g fill="none" opacity="0.18">
    <ellipse cx="600" cy="820" rx="758" ry="406" stroke="#8888bb" stroke-width="0.6" stroke-dasharray="4,8"/>
    <ellipse cx="600" cy="820" rx="775" ry="418" stroke="#9999cc" stroke-width="0.5" stroke-dasharray="4,10"/>
    <ellipse cx="600" cy="820" rx="800" ry="435" stroke="#aaaadd" stroke-width="0.4" stroke-dasharray="4,12"/>
    <ellipse cx="600" cy="820" rx="835" ry="458" stroke="#bbbbee" stroke-width="0.3" stroke-dasharray="4,16"/>
  </g>

  <!-- Atmosphere limb glow -->
  <ellipse cx="600" cy="820" rx="755" ry="403" fill="none" stroke="#f5d07a" stroke-width="2" opacity="0.08"/>
  <ellipse cx="600" cy="820" rx="753" ry="401" fill="none" stroke="#edb555" stroke-width="1" opacity="0.12"/>

  <!-- Sun (below horizon, partially visible as glow) -->
  <circle cx="220" cy="445" r="22" fill="#f5d07a" opacity="0.15" filter="url(#soft)"/>
  <circle cx="220" cy="445" r="10" fill="#f5d07a" opacity="0.25"/>

  <!-- Solar rays entering atmosphere (straight lines from sun direction) -->
  <g opacity="0.12" stroke-width="0.7">
    <line x1="240" y1="438" x2="520" y2="395" stroke="#f5d07a"/>
    <line x1="240" y1="435" x2="580" y2="380" stroke="#edb555"/>
    <line x1="242" y1="430" x2="640" y2="365" stroke="#de8a3a"/>
    <line x1="245" y1="425" x2="700" y2="355" stroke="#c4553f"/>
  </g>

  <!-- Scatter points (where photons scatter toward observer) -->
  <g opacity="0.35">
    <circle cx="520" cy="395" r="2.5" fill="#6688cc" filter="url(#soft)"/>
    <circle cx="580" cy="380" r="2.0" fill="#7799cc" filter="url(#soft)"/>
    <circle cx="640" cy="365" r="2.0" fill="#cc8855" filter="url(#soft)"/>
    <circle cx="700" cy="355" r="1.8" fill="#cc6644" filter="url(#soft)"/>
  </g>

  <!-- Scattered light paths (from scatter points toward observer) -->
  <g opacity="0.08" stroke-width="0.8" stroke-dasharray="3,4">
    <line x1="520" y1="395" x2="830" y2="410" stroke="#6688cc"/>
    <line x1="580" y1="380" x2="830" y2="410" stroke="#7799cc"/>
    <line x1="640" y1="365" x2="830" y2="410" stroke="#cc8855"/>
    <line x1="700" y1="355" x2="830" y2="410" stroke="#cc6644"/>
  </g>

  <!-- Observer (small figure on Earth surface) -->
  <g transform="translate(830,410)">
    <line x1="0" y1="0" x2="0" y2="-10" stroke="#d0c4a8" stroke-width="1.2" opacity="0.5"/>
    <circle cx="0" cy="-12" r="2" fill="#d0c4a8" opacity="0.5"/>
    <!-- View direction indicator -->
    <line x1="0" y1="-8" x2="-18" y2="-22" stroke="#d0c4a8" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/>
  </g>

  <!-- Labels -->
  <g font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code','Consolas',monospace" opacity="0.3">
    <!-- Shell labels -->
    <text x="1020" y="398" font-size="7" fill="#8888bb">0 km</text>
    <text x="1020" y="388" font-size="7" fill="#9999cc">10 km</text>
    <text x="1020" y="372" font-size="7" fill="#aaaadd">30 km</text>
    <text x="1020" y="350" font-size="7" fill="#bbbbee">100 km (TOA)</text>

    <!-- Sun label -->
    <text x="220" y="475" text-anchor="middle" font-size="7.5" fill="#f5d07a" opacity="1">sun (below horizon)</text>

    <!-- Observer label -->
    <text x="830" y="432" text-anchor="middle" font-size="7.5" fill="#d0c4a8" opacity="1">observer</text>

    <!-- Scatter labels -->
    <text x="520" y="415" text-anchor="middle" font-size="6.5" fill="#6688cc" opacity="0.8">Rayleigh</text>
    <text x="700" y="345" text-anchor="middle" font-size="6.5" fill="#cc6644" opacity="0.8">O₃ absorption</text>
  </g>

  <!-- Project title -->
  <text x="600" y="170" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code','Consolas',monospace" font-size="68" font-weight="700" fill="#f0e6d3" letter-spacing="10" opacity="0.92">twilight</text>

  <!-- Subtitle -->
  <text x="600" y="210" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code','Consolas',monospace" font-size="12.5" fill="#c4a882" letter-spacing="5" opacity="0.6">RADIATIVE TRANSFER FOR PRAYER TIMES</text>

  <!-- Thin divider -->
  <line x1="420" y1="235" x2="780" y2="235" stroke="#c4a882" stroke-width="0.3" opacity="0.2"/>

  <!-- Wavelength spectrum bar (the 380-780nm range the engine computes) -->
  <g transform="translate(420,248)">
    <rect x="0" y="0" width="25" height="3" fill="#7700ff" rx="1" opacity="0.6"/>
    <rect x="25" y="0" width="25" height="3" fill="#0044ff" rx="0" opacity="0.6"/>
    <rect x="50" y="0" width="25" height="3" fill="#0088ff" rx="0" opacity="0.6"/>
    <rect x="75" y="0" width="25" height="3" fill="#00ccaa" rx="0" opacity="0.6"/>
    <rect x="100" y="0" width="25" height="3" fill="#44dd00" rx="0" opacity="0.6"/>
    <rect x="125" y="0" width="25" height="3" fill="#aaee00" rx="0" opacity="0.6"/>
    <rect x="150" y="0" width="25" height="3" fill="#ffdd00" rx="0" opacity="0.6"/>
    <rect x="175" y="0" width="25" height="3" fill="#ffaa00" rx="0" opacity="0.6"/>
    <rect x="200" y="0" width="25" height="3" fill="#ff6600" rx="0" opacity="0.6"/>
    <rect x="225" y="0" width="25" height="3" fill="#ff2200" rx="0" opacity="0.6"/>
    <rect x="250" y="0" width="25" height="3" fill="#cc0022" rx="0" opacity="0.6"/>
    <rect x="275" y="0" width="25" height="3" fill="#990033" rx="0" opacity="0.6"/>
    <rect x="300" y="0" width="25" height="3" fill="#660033" rx="0" opacity="0.6"/>
    <rect x="325" y="0" width="35" height="3" fill="#440022" rx="1" opacity="0.6"/>
    <text x="0" y="14" font-family="monospace" font-size="6.5" fill="#888" opacity="0.5">380 nm</text>
    <text x="360" y="14" text-anchor="end" font-family="monospace" font-size="6.5" fill="#888" opacity="0.5">780 nm</text>
    <text x="180" y="14" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#888" opacity="0.5">41 spectral bands</text>
  </g>
</svg>
